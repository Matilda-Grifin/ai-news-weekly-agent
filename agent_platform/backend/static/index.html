<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI News Harness</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 920px; margin: 0 auto; min-height: 100%; display: flex; flex-direction: column; padding: 1rem 1.25rem 2rem; }
    header { padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
    header p { margin: 0.35rem 0 0; font-size: 0.8rem; color: var(--muted); }
    #log { flex: 1; overflow-y: auto; padding: 1rem 0; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { padding: 0.65rem 0.85rem; border-radius: 8px; max-width: 100%; white-space: pre-wrap; word-break: break-word; font-size: 0.9rem; line-height: 1.45; }
    .msg.user { background: var(--panel); align-self: flex-end; border: 1px solid var(--border); }
    .msg.bot { background: #161b22; align-self: stretch; border: 1px solid var(--border); }
    .row { display: flex; gap: 0.5rem; margin-top: auto; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    textarea {
      flex: 1; min-height: 44px; max-height: 160px; resize: vertical;
      background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.65rem; font: inherit;
    }
    button {
      background: var(--accent); color: #0f1419; border: none; border-radius: 8px; padding: 0 1rem; font-weight: 600; cursor: pointer; font-size: 0.9rem;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>AI News Harness</h1>
      <p>API 从仓库根目录 .env 读取 · 无侧栏 · 默认端口 8787</p>
    </header>
    <div id="log"></div>
    <div class="row">
      <textarea id="input" placeholder="输入需求，例如：生成本周 AI 周报，关注 Agent 与 MCP…" rows="2"></textarea>
      <button id="send" type="button">发送</button>
    </div>
  </div>
  <script>
    const log = document.getElementById("log");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    let sessionId = null;

    async function ensureSession() {
      if (sessionId) return sessionId;
      const r = await fetch("/api/session", { method: "POST" });
      if (!r.ok) throw new Error("session failed");
      const j = await r.json();
      sessionId = j.session_id;
      return sessionId;
    }

    function append(role, text) {
      const d = document.createElement("div");
      d.className = "msg " + (role === "user" ? "user" : "bot");
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = role === "user" ? "你" : "Agent";
      d.appendChild(meta);
      const t = document.createElement("div");
      t.textContent = text;
      d.appendChild(t);
      log.appendChild(d);
      log.scrollTop = log.scrollHeight;
    }

    async function go() {
      const text = input.value.trim();
      if (!text) return;
      send.disabled = true;
      append("user", text);
      input.value = "";
      try {
        const sid = await ensureSession();
        const r = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sid, message: text }),
        });
        const j = r.ok ? await r.json() : { reply: await r.text() };
        append("bot", j.reply || JSON.stringify(j));
      } catch (e) {
        append("bot", String(e));
      }
      send.disabled = false;
      input.focus();
    }

    send.addEventListener("click", go);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); go(); }
    });
  </script>
</body>
</html>
